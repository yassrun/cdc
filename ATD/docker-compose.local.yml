version: '3.9'

services:
  # ============================================================
  # PostgreSQL Database
  # ============================================================
  postgres:
    image: postgres:15-alpine
    container_name: wkf-atd-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-postgres}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wkf-atd-network
    restart: unless-stopped

  # ============================================================
  # Keycloak Authentication Server
  # ============================================================
  keycloak:
    image: keycloak/keycloak:24.0.1
    container_name: wkf-atd-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${DB_USER:-postgres}
      KC_DB_PASSWORD: ${DB_PASSWORD:-postgres}
      KC_PROXY: edge
      KC_HTTP_ENABLED: true
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    command:
      - "start-dev"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - wkf-atd-network
    restart: unless-stopped

  # ============================================================
  # Mailhog - Email Mock (Optional)
  # ============================================================
  mailhog:
    image: mailhog/mailhog:latest
    container_name: wkf-atd-mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - wkf-atd-network
    restart: unless-stopped
    profiles:
      - debug

  # ============================================================
  # Redis Cache (Optional)
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: wkf-atd-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wkf-atd-network
    restart: unless-stopped
    profiles:
      - cache

networks:
  wkf-atd-network:
    driver: bridge

volumes:
  postgres_data:
    name: wkf-atd-postgres-data
